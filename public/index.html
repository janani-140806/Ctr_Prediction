<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CTR Prediction System</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Click Through Rate (CTR) Prediction</h1>
        <p class="subtitle">Enter user/ad details to predict CTR.</p>

        <form id="ctrForm">
          <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" min="1" max="120" required />
          </div>

          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" required>
              <option value="" disabled selected>Select gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>

          <div class="form-group">
            <label for="device">Device</label>
            <select id="device" required>
              <option value="" disabled selected>Select device</option>
              <option value="Mobile">Mobile</option>
              <option value="Desktop">Desktop</option>
            </select>
          </div>

          <div class="form-group">
            <label for="category">Ad Category</label>
            <select id="category" required>
              <option value="" disabled selected>Select category</option>
              <option value="Tech">Tech</option>
              <option value="Fashion">Fashion</option>
              <option value="Food">Food</option>
            </select>
          </div>

          <div class="form-group">
            <label for="time">Time of Day</label>
            <select id="time" required>
              <option value="" disabled selected>Select time</option>
              <option value="Morning">Morning</option>
              <option value="Evening">Evening</option>
            </select>
          </div>

          <button type="submit" id="predictBtn">Predict CTR</button>
        </form>

        <div id="resultBox" class="result hidden"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
